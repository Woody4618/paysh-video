name: prod-gateway
subdomain: prod-gateway
title: 'Production Gateway'
description: 'Same spec as sandbox — only the operator block changes for mainnet.'
category: data
version: v1

routing:
  type: respond

operator:
  currencies:
    # Recommended baseline when all rails are supported.
    usd: ['USDC', 'USDT', 'CASH']

  # The lines that change between sandbox and mainnet:
  network: mainnet

  # Production signer. The repo's recommended production form is GCP KMS — the
  # private key stays in Cloud KMS/HSM and the service account gets only the
  # minimum IAM to sign.
  signer:
    backend: gcp-kms
    key_name: '${PAY_GCP_KMS_KEY_NAME}'
    pubkey: '${PAY_GCP_KMS_PUBKEY}'

  # Point at your production RPC (Helius, Triton, QuickNode, …).
  rpc_url: '${PAY_RPC_URL}'

  # Wallet that collects revenue. Keep it separate from the fee-payer wallet.
  recipient: '${PAY_PAYMENT_RECIPIENT}'

  # Sponsor the SOL fee so customers pay only stablecoins.
  fee_payer: true

endpoints:
  - method: GET
    path: 'v1/health'
    resource: 'health'
    description: 'Health check (free).'

  - method: GET
    path: 'v1/reports/usage'
    resource: 'reports'
    description: 'Usage report. $0.01 per verified request.'
    metering:
      dimensions:
        - direction: usage
          unit: requests
          scale: 1
          tiers:
            - price_usd: 0.01
