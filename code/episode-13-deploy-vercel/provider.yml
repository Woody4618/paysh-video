name: weather-pro
subdomain: weather-pro
title: 'Weather Pro'
description: 'Paid weather forecasts. Wraps an upstream weather API behind a 402 paywall.'
category: data
version: v1

# `proxy` means: after the caller pays, forward the request to the upstream.
# Here the "upstream" is THIS SAME app's own Next.js route (/api/forecast) — the
# real API logic lives in the Next.js app, and the gateway is the paywall in
# front of it.
#
# The `auth` block injects a shared secret the gateway holds. The /api/forecast
# route checks for it and rejects anything that didn't come through the paid
# gateway — so callers can't bypass payment by hitting /api/forecast directly.
routing:
  type: proxy
  # In production this is the app's own public origin. Locally it's the
  # `next dev` server (see README for the localnet test flow).
  #
  # This is the ONE field the entrypoint substitutes: routing.url has no CLI flag
  # or env fallback in pay, and pay does not expand ${VAR} in the YAML. The
  # container replaces ${UPSTREAM_ORIGIN} at boot (see entrypoint.sh). For local
  # runs, export UPSTREAM_ORIGIN and do the same, or just hardcode the URL.
  url: '${UPSTREAM_ORIGIN}/api/'
  auth:
    method: header
    key: x-gateway-secret
    # Unlike the ${VAR} fields, `value_from_env` IS resolved natively by pay:
    # it reads the GATEWAY_SHARED_SECRET env var at runtime. The Next.js route
    # validates the same value. Never put the secret in this file.
    value_from_env: GATEWAY_SHARED_SECRET

operator:
  currencies:
    # ORDER MATTERS. pay uses the FIRST entry as the "primary" currency for the
    # MPP charge challenge. Put the coin your callers actually hold first — most
    # wallets hold USDC, so USDC leads. If the gateway only advertises one
    # challenge and it's denominated in a coin the caller doesn't hold, the
    # client rejects with "does not have enough balance for any advertised MPP
    # challenge" — even though fee_payer sponsors the SOL fee. (That was the CASH
    # vs USDC bug: keep USDC first.)
    usd: ['USDC']
  # Flip to `mainnet` for the real deploy. `localnet` is for sandbox testing.
  network: mainnet
  fee_payer: true
  # rpc_url and recipient are intentionally NOT set here:
  #   - pay reads the RPC endpoint from the PAY_RPC_URL env var natively.
  #   - the entrypoint passes the recipient via `--recipient $PAY_PAYMENT_RECIPIENT`.
  # This avoids the old ${VAR}-in-YAML substitution hack (pay does not expand
  # ${...} in these fields). The only field the entrypoint still rewrites in this
  # file is routing.url, because routing has no CLI flag or env fallback.
  # Signer: how the gateway loads the fee-payer wallet.
  #
  # File signer (simple) — points at a 64-byte Solana CLI keypair JSON on disk.
  # The container entrypoint writes this file at boot from the PAY_SIGNER_KEYPAIR
  # env var (see Dockerfile.vercel); nothing sensitive is baked into the image.
  #
  # ⚠️  TREAT THIS AS A HOT WALLET. The raw private key lives in a Vercel env var
  #     and is written to each ephemeral instance's /tmp. Anyone with dashboard
  #     access can read it. Keep only a few dollars of USDC + minimal SOL on it,
  #     and sweep revenue to a cold account regularly (`pay push`). Migrate to a
  #     KMS signer (below) before this holds real value.
  #
  # NOTE: gcp-kms requires a pay build with `--features gcp_kms`. The stock
  # ghcr.io/solana-foundation/pay:latest image is NOT built with it, so this
  # backend will error at startup on that image. To use KMS you must either
  # build a custom image (`cargo build --features gcp_kms`) or run the gateway
  # on a host with native GCP auth (e.g. Cloud Run). See README.
  signer:
    backend: file
    path: /tmp/gateway-keypair.json

  # KMS alternative (needs a gcp_kms-enabled build — see NOTE above):
  # signer:
  #   backend: gcp-kms
  #   key_name: '${PAY_GCP_KMS_KEY_NAME}'
  #   pubkey: '${PAY_GCP_KMS_PUBKEY}'

# endpoints[] is BOTH the price list AND the allowlist. Anything not listed
# here returns 404 — even if the upstream route exists.
# NOTE: `path` is relative to routing.url, so `forecast` maps to
# `${UPSTREAM_ORIGIN}/api/forecast`.
endpoints:
  # Free: lets agents/humans probe the gateway without paying.
  - method: GET
    path: 'health'
    description: 'Health check. Free.'

  # Paid: $0.01 per forecast lookup.
  - method: GET
    path: 'forecast'
    resource: 'forecast'
    description: 'Current + 7-day forecast for a location. $0.01 per request.'
    metering:
      dimensions:
        - direction: usage
          unit: requests
          scale: 1
          tiers:
            - price_usd: 0.01
