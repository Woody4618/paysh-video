name: weather-pro
subdomain: weather-pro
title: 'Weather Pro'
description: 'Paid weather forecasts. Wraps an upstream weather API behind a 402 paywall.'
category: data
version: v1

# `proxy` means: after the caller pays, forward the request to the upstream.
# Here the "upstream" is THIS SAME app's own Next.js route (/api/forecast) — the
# real API logic lives in the Next.js app, and the gateway is the paywall in
# front of it.
#
# The `auth` block injects a shared secret the gateway holds. The /api/forecast
# route checks for it and rejects anything that didn't come through the paid
# gateway — so callers can't bypass payment by hitting /api/forecast directly.
routing:
  type: proxy
  # Where paid requests get forwarded. In production this is the app's own public
  # origin; locally it's the `next dev` server (see README for the test flow).
  #
  # pay expands ${VAR} in the spec at load time from the process environment, so
  # UPSTREAM_ORIGIN just needs to be set before `pay server start` (a .env file
  # locally, project env vars on Vercel). No shell substitution, no entrypoint.
  url: '${UPSTREAM_ORIGIN}/api/'
  auth:
    method: header
    key: x-gateway-secret
    # Unlike the ${VAR} fields, `value_from_env` IS resolved natively by pay:
    # it reads the GATEWAY_SHARED_SECRET env var at runtime. The Next.js route
    # validates the same value. Never put the secret in this file.
    value_from_env: GATEWAY_SHARED_SECRET

operator:
  currencies:
    # ORDER MATTERS. pay uses the FIRST entry as the "primary" currency for the
    # MPP charge challenge. Put the coin your callers actually hold first — most
    # wallets hold USDC, so USDC leads. If the gateway only advertises one
    # challenge and it's denominated in a coin the caller doesn't hold, the
    # client rejects with "does not have enough balance for any advertised MPP
    # challenge" — even though fee_payer sponsors the SOL fee. (That was the CASH
    # vs USDC bug: keep USDC first.)
    usd: ['USDC']
  # Flip to `mainnet` for the real deploy. `localnet` is for sandbox testing.
  network: mainnet
  fee_payer: true
  # rpc_url and recipient are expanded from the environment at load time. Set
  # PAY_RPC_URL and PAY_PAYMENT_RECIPIENT before starting the gateway (a .env
  # file locally, project env vars on Vercel).
  rpc_url: '${PAY_RPC_URL}'
  recipient: '${PAY_PAYMENT_RECIPIENT}'
  # Signer: how the gateway loads the fee-payer wallet.
  #
  # env signer — pay reads the 64-byte keypair straight from an env var into
  # memory. Value can be a Solana CLI JSON array (`[12,34,...]`, 64 bytes) or a
  # base58 secret key. Nothing is written to disk and nothing is baked into the
  # image; on Vercel this comes from the PAY_OPERATOR_KEYPAIR project env var.
  # (The var name is arbitrary — it just has to match value_from_env below.)
  #
  # ⚠️  TREAT THIS AS A HOT WALLET. The raw private key lives in an env var, so
  #     anyone with dashboard access can read it. Keep only a few dollars of USDC
  #     + minimal SOL on it, and sweep revenue to a cold account regularly
  #     (`pay push`). Migrate to a KMS signer (below) before this holds real value.
  #
  # NOTE: gcp-kms requires a pay build with `--features gcp_kms`. The stock
  # ghcr.io/solana-foundation/pay:latest image is NOT built with it, so that
  # backend errors at startup on this image. To use KMS you must build a custom
  # image (`cargo build --features gcp_kms`) or run on a host with native GCP
  # auth (e.g. Cloud Run). See README.
  signer:
    backend: env
    value_from_env: PAY_OPERATOR_KEYPAIR

  # KMS alternative (needs a gcp_kms-enabled build — see NOTE above):
  # signer:
  #   backend: gcp-kms
  #   key_name: '${PAY_GCP_KMS_KEY_NAME}'
  #   pubkey: '${PAY_GCP_KMS_PUBKEY}'

# endpoints[] is BOTH the price list AND the allowlist. Anything not listed
# here returns 404 — even if the upstream route exists.
# NOTE: `path` is relative to routing.url, so `forecast` maps to
# `${UPSTREAM_ORIGIN}/api/forecast`.
endpoints:
  # Free (no metering). NOTE: `description` becomes the OpenAPI operation
  # `summary` in the gateway's synthesized /openapi.json — and the pay-skills
  # catalog validator requires summaries to be verb-first, 24-63 chars, and free
  # of cost/marketing words ("free", "$0.01"). Keep the free/paid intent in
  # these comments, not in the description text.
  - method: GET
    path: 'health'
    description: 'Check the Weather Pro service health and availability status.'

  # Free (no metering) — discovery list so callers can learn valid `?location=`
  # values before paying for a forecast.
  - method: GET
    path: 'locations'
    description: 'List the locations supported for weather forecast lookups.'

  # Paid: $0.01 per forecast lookup (price lives in metering below, not the text).
  - method: GET
    path: 'forecast'
    resource: 'forecast'
    description: 'Fetch current conditions and 7-day forecast for a location.'
    metering:
      dimensions:
        - direction: usage
          unit: requests
          scale: 1
          tiers:
            - price_usd: 0.01
